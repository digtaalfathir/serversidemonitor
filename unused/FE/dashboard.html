<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Monitoring Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-bright: #f8fafc;
      --up: #10b981;
      --up-glow: rgba(16, 185, 129, 0.25);
      --down: #ef4444;
      --down-glow: rgba(239, 68, 68, 0.25);
      --critical: #ef4444;
      --high: #f59e0b;
      --medium: #3b82f6;
      --low: #6b7280;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none
    }

    .header {
      position: relative;
      z-index: 1;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(10, 14, 26, 0.8)
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background .3s
    }

    .conn-dot.connected {
      background: #10b981;
      box-shadow: 0 0 8px var(--up-glow)
    }

    .meta {
      font-size: 12px;
      color: var(--text-dim)
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 24px 32px
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      backdrop-filter: blur(12px);
      transition: transform .2s, box-shadow .2s, border-color .3s;
      position: relative;
      overflow: hidden
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3)
    }

    .card.status-up {
      border-left: 3px solid var(--up)
    }

    .card.status-down {
      border-left: 3px solid var(--down);
      animation: pulse-border 2s infinite
    }

    @keyframes pulse-border {

      0%,
      100% {
        border-left-color: var(--down)
      }

      50% {
        border-left-color: #fca5a5
      }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px
    }

    .dev-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      max-width: 200px
    }

    .dev-ip {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      font-family: monospace
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .sev-CRITICAL {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5
    }

    .sev-HIGH {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d
    }

    .sev-MEDIUM {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd
    }

    .sev-LOW {
      background: rgba(107, 114, 128, 0.15);
      color: #9ca3af
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px
    }

    .stat {
      text-align: center;
      padding: 8px 4px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700
    }

    .stat-value.up {
      color: var(--up)
    }

    .stat-value.down {
      color: var(--down)
    }

    .stat-value.latency {
      color: var(--accent)
    }

    .avail-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px
    }

    .avail-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--up), #34d399);
      transition: width .5s ease
    }

    .avail-text {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between
    }

    .downtime-live {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 8px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
      align-items: center;
      gap: 6px
    }

    .downtime-live .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1s infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .history-section {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px
    }

    .history-title {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 80px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent
    }

    .tl-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px
    }

    .tl-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .tl-dot.up {
      background: var(--up)
    }

    .tl-dot.down {
      background: var(--down)
    }

    .tl-time {
      color: var(--text-dim);
      font-family: monospace;
      font-size: 10px
    }

    .tl-status {
      font-weight: 600;
      font-size: 10px
    }

    .summary-bar {
      position: relative;
      z-index: 1;
      padding: 16px 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border)
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600
    }

    .summary-count {
      font-size: 22px;
      font-weight: 800
    }

    /* ===== Filter Bar ===== */
    .filter-bar{position:relative;z-index:1;padding:14px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.5)}
    .filter-search{padding:8px 14px 8px 36px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:220px;transition:border-color .2s,width .2s}
    .filter-search:focus{border-color:#6366f1;width:280px}
    .filter-search-wrap{position:relative}
    .filter-search-wrap::before{content:'\1F50D';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5;pointer-events:none}
    .filter-pills{display:flex;gap:4px}
    .filter-pill{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
    .filter-pill:hover{background:rgba(255,255,255,0.06)}
    .filter-pill.active{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.4);color:#a5b4fc}
    .filter-pill.active-up{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#6ee7b7}
    .filter-pill.active-down{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:#fca5a5}
    .filter-select{padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:border-color .2s}
    .filter-select:focus{border-color:#6366f1}
    .filter-select option{background:#1e293b;color:var(--text)}
    .filter-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
    .filter-count{font-size:11px;color:var(--text-dim);margin-left:auto;flex-shrink:0}

    /* ===== FAB Button ===== */
    .fab{position:fixed;bottom:28px;right:28px;z-index:100;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
    .fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(99,102,241,0.55)}

    /* ===== Modal Overlay ===== */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#111827;border:1px solid var(--border);border-radius:16px;padding:28px;width:min(460px,90vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:modalIn .25s ease}
    @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .modal h2{font-size:18px;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .modal label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
    .modal label:first-of-type{margin-top:0}
    .modal input,.modal select{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .modal input:focus,.modal select:focus{border-color:#6366f1}
    .modal select option{background:#1e293b;color:var(--text)}
    .modal-actions{display:flex;gap:10px;margin-top:22px}
    .modal-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff}
    .btn-primary:hover{opacity:.85}
    .btn-cancel{background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid var(--border) !important}
    .btn-cancel:hover{background:rgba(255,255,255,0.1)}
    .btn-danger{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2) !important}
    .btn-danger:hover{background:rgba(239,68,68,0.25)}

    /* ===== Card action buttons ===== */
    .card-actions{display:flex;gap:6px;margin-top:10px}
    .card-actions button{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:background .2s}
    .btn-edit{background:rgba(99,102,241,0.12);color:#a5b4fc}
    .btn-edit:hover{background:rgba(99,102,241,0.22)}
    .btn-del{background:rgba(239,68,68,0.1);color:#fca5a5}
    .btn-del:hover{background:rgba(239,68,68,0.2)}

    /* ===== Toast ===== */
    .toast{position:fixed;bottom:90px;right:28px;z-index:300;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none;max-width:340px}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.ok{background:rgba(16,185,129,0.9)}
    .toast.err{background:rgba(239,68,68,0.9)}

    /* ===== Latency mini stats ===== */
    .lat-stats{display:flex;gap:10px;margin-top:6px;font-size:10px;color:var(--text-dim)}
    .lat-stats span{display:flex;align-items:center;gap:3px}
    .lat-stats .val{color:var(--text-bright);font-weight:600}
    .lat-stats .peak{color:#f59e0b}

    /* ===== Detail Modal ===== */
    .detail-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
    .detail-overlay.open{display:flex}
    .detail-modal{background:#111827;border:1px solid var(--border);border-radius:16px;padding:28px;width:min(520px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:modalIn .25s ease}
    .detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
    .detail-header h2{font-size:18px;font-weight:700;color:var(--text-bright)}
    .detail-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .2s}
    .detail-close:hover{background:rgba(255,255,255,0.08)}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .detail-item{padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px}
    .detail-item.full{grid-column:1/-1}
    .detail-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .detail-val{font-size:14px;font-weight:600;color:var(--text-bright)}
    .detail-val.up{color:var(--up)}.detail-val.down{color:var(--down)}
    .detail-section-title{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .detail-notes{width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:60px;transition:border-color .2s}
    .detail-notes:focus{border-color:#6366f1}
    .detail-meta-input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .detail-meta-input:focus{border-color:#6366f1}
    .detail-save{margin-top:14px;padding:10px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .detail-save:hover{opacity:.85}
    .card{cursor:pointer}
  </style>
</head>

<body>

  <div class="header">
    <div>
      <h1>⚡ Device Monitoring</h1>
      <div class="meta" id="lastUpdate">Connecting...</div>
    </div>
    <div class="conn-status">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Disconnected</span>
    </div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><span class="summary-count" id="totalDevices" style="color:var(--accent)">0</span> Total</div>
    <div class="summary-item"><span class="summary-count" id="upCount" style="color:var(--up)">0</span> Up</div>
    <div class="summary-item"><span class="summary-count" id="downCount" style="color:var(--down)">0</span> Down</div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="filter-search-wrap">
      <input type="text" class="filter-search" id="filterSearch" placeholder="Search name or IP...">
    </div>
    <div class="filter-divider"></div>
    <div class="filter-pills" id="statusPills">
      <button class="filter-pill active" data-status="ALL">All</button>
      <button class="filter-pill" data-status="UP">● Up</button>
      <button class="filter-pill" data-status="DOWN">● Down</button>
    </div>
    <div class="filter-divider"></div>
    <select class="filter-select" id="filterSeverity">
      <option value="ALL">All Severity</option>
      <option value="CRITICAL">Critical</option>
      <option value="HIGH">High</option>
      <option value="MEDIUM">Medium</option>
      <option value="LOW">Low</option>
    </select>
    <select class="filter-select" id="filterSort">
      <option value="name">Sort: Name</option>
      <option value="status">Sort: Status</option>
      <option value="severity">Sort: Severity</option>
      <option value="latency">Sort: Latency</option>
      <option value="availability">Sort: Availability</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="grid" id="deviceGrid"></div>

  <!-- FAB -->
  <button class="fab" id="fabAdd" title="Add Device">＋</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Device</h2>
      <label for="inputName">Device Name</label>
      <input type="text" id="inputName" placeholder="e.g. Server Rack A1">
      <label for="inputIp">IP Address</label>
      <input type="text" id="inputIp" placeholder="e.g. 192.168.1.10">
      <label for="inputSev">Severity</label>
      <select id="inputSev">
        <option value="CRITICAL">CRITICAL</option>
        <option value="HIGH">HIGH</option>
        <option value="MEDIUM" selected>MEDIUM</option>
        <option value="LOW">LOW</option>
      </select>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-primary" id="btnSubmit">Add Device</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-modal" id="detailModal"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const WS_URL = `ws://10.10.1.210:10011`;
    let ws, devicesData = [], downtimeTimers = {};
    let editingDevice = null; // null = add mode, string = editing device name

    // ===== Filter State =====
    let filterStatus = 'ALL';
    let filterSeverity = 'ALL';
    let filterSearch = '';
    let filterSortBy = 'name';

    const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };

    function getFilteredDevices() {
      let list = devicesData.slice();
      // search
      if (filterSearch) {
        const q = filterSearch.toLowerCase();
        list = list.filter(d => d.name.toLowerCase().includes(q) || d.ip.includes(q));
      }
      // status
      if (filterStatus !== 'ALL') {
        list = list.filter(d => d.status === filterStatus);
      }
      // severity
      if (filterSeverity !== 'ALL') {
        list = list.filter(d => d.severity === filterSeverity);
      }
      // sort
      list.sort((a, b) => {
        switch (filterSortBy) {
          case 'status': return (a.status === 'DOWN' ? 0 : 1) - (b.status === 'DOWN' ? 0 : 1);
          case 'severity': return (SEV_ORDER[a.severity] ?? 9) - (SEV_ORDER[b.severity] ?? 9);
          case 'latency': return ((a.latency ?? 9999) - (b.latency ?? 9999));
          case 'availability': return (a.uptimeToday ?? 100) - (b.uptimeToday ?? 100);
          default: return a.name.localeCompare(b.name);
        }
      });
      return list;
    }

    // ===== WebSocket =====
    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => { setConn(true); };
      ws.onclose = () => { setConn(false); setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'cmd_result') {
          showToast(msg.message, msg.ok);
          if (msg.ok) closeModal();
          return;
        }
        if (msg.devices) { devicesData = msg.devices; render(); }
        if (msg.timestamp) document.getElementById('lastUpdate').textContent = `Last update: ${msg.timestamp}`;
      };
    }

    function sendCmd(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', ...payload }));
      } else {
        showToast('WebSocket tidak terhubung', false);
      }
    }

    function setConn(ok) {
      document.getElementById('connDot').classList.toggle('connected', ok);
      document.getElementById('connLabel').textContent = ok ? 'Connected' : 'Disconnected';
    }

    // ===== Render =====
    function render() {
      const grid = document.getElementById('deviceGrid');
      document.getElementById('totalDevices').textContent = devicesData.length;
      document.getElementById('upCount').textContent = devicesData.filter(d => d.status === 'UP').length;
      document.getElementById('downCount').textContent = devicesData.filter(d => d.status === 'DOWN').length;

      const filtered = getFilteredDevices();
      const countEl = document.getElementById('filterCount');
      if (filtered.length < devicesData.length) {
        countEl.textContent = `Showing ${filtered.length} of ${devicesData.length}`;
      } else {
        countEl.textContent = '';
      }

      grid.innerHTML = filtered.map(d => {
        const isDown = d.status === 'DOWN';
        const latStr = d.latency !== null && d.latency !== undefined ? `${d.latency} ms` : '—';
        const avgStr = d.avgLatency !== null && d.avgLatency !== undefined ? `${d.avgLatency} ms` : '—';
        const peakStr = d.maxLatency !== null && d.maxLatency !== undefined ? `${d.maxLatency} ms` : '—';
        const avail = d.uptimeToday ?? 100;
        const downSec = d.downtimeTodaySec ?? 0;
        const hist = (d.history || []).slice(-5).reverse();
        const eName = escAttr(d.name);

        return `
    <div class="card status-${d.status.toLowerCase()}" data-name="${eName}" onclick="openDetail('${eName}')">
      <div class="card-top">
        <div><div class="dev-name">${esc(d.name)}</div><div class="dev-ip">${d.ip}</div></div>
        <span class="badge sev-${d.severity}">${d.severity}</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Status</div><div class="stat-value ${isDown ? 'down' : 'up'}">${d.status}</div></div>
        <div class="stat"><div class="stat-label">Latency</div><div class="stat-value latency">${latStr}</div></div>
        <div class="stat"><div class="stat-label">Avail</div><div class="stat-value" style="color:${avail >= 99 ? 'var(--up)' : avail >= 95 ? 'var(--high)' : 'var(--down)'}">${avail}%</div></div>
      </div>
      <div class="lat-stats">
        <span>Avg: <em class="val">${avgStr}</em></span>
        <span>Peak: <em class="val peak">${peakStr}</em></span>
      </div>
      <div class="avail-bar"><div class="avail-fill" style="width:${avail}%"></div></div>
      <div class="avail-text"><span>Uptime today</span><span>Downtime: ${fmtSec(downSec)}</span></div>
      <div class="downtime-live" id="dt-${cssName(d.name)}" style="display:${isDown && d.downSince ? 'flex' : 'none'}" data-since="${d.downSince || ''}">
        <div class="pulse"></div>
        <span>Down for <strong class="dt-counter">00h 00m 00s</strong></span>
      </div>
      ${hist.length ? `
      <div class="history-section">
        <div class="history-title">Recent Events</div>
        <div class="timeline">${hist.map(h => `
          <div class="tl-item">
            <div class="tl-dot ${h.status.toLowerCase()}"></div>
            <span class="tl-time">${h.timestamp}</span>
            <span class="tl-status" style="color:${h.status === 'UP' ? 'var(--up)' : 'var(--down)'}">${h.status}</span>
          </div>`).join('')}
        </div>
      </div>` : ''}
      <div class="card-actions">
        <button class="btn-edit" onclick="event.stopPropagation();openEdit('${eName}')">✏ Edit</button>
        <button class="btn-del" onclick="event.stopPropagation();confirmDelete('${eName}')">✕ Delete</button>
      </div>
    </div>`;
      }).join('');

      startDowntimeCounters();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
    function cssName(n) { return n.replace(/[^a-zA-Z0-9]/g, '_'); }
    function fmtSec(s) { if (!s) return '0s'; const m = Math.floor(s / 60), h = Math.floor(m / 60); return h ? `${h}h ${m % 60}m` : m ? `${m}m ${s % 60}s` : `${s}s`; }

    function startDowntimeCounters() {
      Object.values(downtimeTimers).forEach(clearInterval);
      downtimeTimers = {};
      document.querySelectorAll('.downtime-live[data-since]').forEach(el => {
        const since = el.dataset.since;
        if (!since || el.style.display === 'none') return;
        const id = el.id;
        const counter = el.querySelector('.dt-counter');
        function tick() {
          const s = since.replace(' ', 'T');
          const diff = Math.max(0, Math.floor((Date.now() - new Date(s).getTime()) / 1000));
          const hh = String(Math.floor(diff / 3600)).padStart(2, '0');
          const mm = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
          const ss = String(diff % 60).padStart(2, '0');
          counter.textContent = `${hh}h ${mm}m ${ss}s`;
        }
        tick();
        downtimeTimers[id] = setInterval(tick, 1000);
      });
    }

    // ===== Modal =====
    const overlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const inputName = document.getElementById('inputName');
    const inputIp = document.getElementById('inputIp');
    const inputSev = document.getElementById('inputSev');
    const btnSubmit = document.getElementById('btnSubmit');

    document.getElementById('fabAdd').onclick = () => openAdd();
    document.getElementById('btnCancel').onclick = () => closeModal();
    overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

    btnSubmit.onclick = () => {
      const name = inputName.value.trim();
      const ip = inputIp.value.trim();
      const severity = inputSev.value;
      if (!name || !ip) return showToast('Name dan IP wajib diisi.', false);

      if (editingDevice) {
        sendCmd({ action: 'edit_device', originalName: editingDevice, name, ip, severity });
      } else {
        sendCmd({ action: 'add_device', name, ip, severity });
      }
    };

    function openAdd() {
      editingDevice = null;
      modalTitle.textContent = 'Add Device';
      btnSubmit.textContent = 'Add Device';
      inputName.value = ''; inputIp.value = ''; inputSev.value = 'MEDIUM';
      overlay.classList.add('open');
      inputName.focus();
    }

    function openEdit(name) {
      const realName = name.replace(/\\'/g, "'");
      const d = devicesData.find(x => x.name === realName);
      if (!d) return;
      editingDevice = realName;
      modalTitle.textContent = 'Edit Device';
      btnSubmit.textContent = 'Save Changes';
      inputName.value = d.name;
      inputIp.value = d.ip;
      inputSev.value = d.severity;
      overlay.classList.add('open');
      inputName.focus();
    }

    function closeModal() {
      overlay.classList.remove('open');
      editingDevice = null;
    }

    function confirmDelete(name) {
      const realName = name.replace(/\\'/g, "'");
      if (confirm(`Hapus device "${realName}"?`)) {
        sendCmd({ action: 'delete_device', name: realName });
      }
    }

    // ===== Toast =====
    let toastTimer;
    function showToast(msg, ok) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ===== Filter Controls =====
    document.getElementById('filterSearch').addEventListener('input', (e) => {
      filterSearch = e.target.value.trim();
      render();
    });

    document.querySelectorAll('#statusPills .filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        filterStatus = btn.dataset.status;
        document.querySelectorAll('#statusPills .filter-pill').forEach(b => {
          b.className = 'filter-pill';
        });
        if (filterStatus === 'ALL') btn.classList.add('active');
        else if (filterStatus === 'UP') btn.classList.add('active-up');
        else btn.classList.add('active-down');
        render();
      });
    });

    document.getElementById('filterSeverity').addEventListener('change', (e) => {
      filterSeverity = e.target.value;
      render();
    });

    document.getElementById('filterSort').addEventListener('change', (e) => {
      filterSortBy = e.target.value;
      render();
    });

    // ===== Keyboard shortcut =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeModal(); closeDetail(); }
    });

    // ===== Detail Modal =====
    const detailOverlay = document.getElementById('detailOverlay');
    const detailModal = document.getElementById('detailModal');
    detailOverlay.onclick = (e) => { if (e.target === detailOverlay) closeDetail(); };

    function openDetail(name) {
      const realName = name.replace(/\\'/g, "'");
      const d = devicesData.find(x => x.name === realName);
      if (!d) return;
      const isDown = d.status === 'DOWN';
      const latStr = d.latency !== null && d.latency !== undefined ? `${d.latency} ms` : '—';
      const avgStr = d.avgLatency !== null && d.avgLatency !== undefined ? `${d.avgLatency} ms` : '—';
      const peakStr = d.maxLatency !== null && d.maxLatency !== undefined ? `${d.maxLatency} ms` : '—';
      const avail = d.uptimeToday ?? 100;

      detailModal.innerHTML = `
        <div class="detail-header">
          <div>
            <h2>${esc(d.name)}</h2>
            <div style="font-size:12px;color:var(--text-dim);margin-top:2px;font-family:monospace">${d.ip} · <span class="badge sev-${d.severity}" style="font-size:9px;vertical-align:middle">${d.severity}</span></div>
          </div>
          <button class="detail-close" onclick="closeDetail()">✕</button>
        </div>

        <div class="detail-section-title">⚡ Network Quality</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Status</div><div class="detail-val ${isDown ? 'down' : 'up'}">${d.status}</div></div>
          <div class="detail-item"><div class="detail-label">Availability</div><div class="detail-val" style="color:${avail >= 99 ? 'var(--up)' : 'var(--down)'}">${avail}%</div></div>
          <div class="detail-item"><div class="detail-label">Current Latency</div><div class="detail-val" style="color:var(--accent)">${latStr}</div></div>
          <div class="detail-item"><div class="detail-label">Average Latency</div><div class="detail-val" style="color:var(--text-bright)">${avgStr}</div></div>
          <div class="detail-item"><div class="detail-label">Peak Latency</div><div class="detail-val" style="color:#f59e0b">${peakStr}</div></div>
          <div class="detail-item"><div class="detail-label">Downtime Today</div><div class="detail-val">${fmtSec(d.downtimeTodaySec ?? 0)}</div></div>
        </div>

        <div class="detail-section-title">📝 Device Information</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Owner</div><input class="detail-meta-input" id="detOwner" value="${escHtml(d.owner || '')}" placeholder="e.g. Production"></div>
          <div class="detail-item"><div class="detail-label">Location</div><input class="detail-meta-input" id="detLocation" value="${escHtml(d.location || '')}" placeholder="e.g. Factory 4"></div>
          <div class="detail-item"><div class="detail-label">Vendor</div><input class="detail-meta-input" id="detVendor" value="${escHtml(d.vendor || '')}" placeholder="e.g. ABC Automation"></div>
          <div class="detail-item full"><div class="detail-label">Notes</div><textarea class="detail-notes" id="detNotes" placeholder="Catatan tentang device ini...">${escHtml(d.notes || '')}</textarea></div>
        </div>
        <button class="detail-save" onclick="saveNotes('${escAttr(d.name)}')">💾 Save Notes</button>
      `;
      detailOverlay.classList.add('open');
    }

    function closeDetail() {
      detailOverlay.classList.remove('open');
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function saveNotes(name) {
      const realName = name.replace(/\\'/g, "'");
      sendCmd({
        action: 'update_notes',
        name: realName,
        owner: document.getElementById('detOwner').value.trim(),
        location: document.getElementById('detLocation').value.trim(),
        vendor: document.getElementById('detVendor').value.trim(),
        notes: document.getElementById('detNotes').value.trim(),
      });
    }

    connect();
  </script>
</body>

</html>
