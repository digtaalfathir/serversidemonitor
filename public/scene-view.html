<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Live — Device Monitoring (scene.json)</title>
  <meta name="description" content="Runtime 3D digital-twin: loads a scene.json authored in Scene Builder and shows live device status.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/floormap.css">
  <link rel="stylesheet" href="/css/floormap3d.css">
  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three/three.module.min.js",
      "three/addons/": "/vendor/three/addons/"
    }
  }
  </script>
</head>
<body>

  <header class="fm-header">
    <div>
      <h1>🛰️ Device Monitoring <span class="fm-tag">3D LIVE · scene.json</span></h1>
      <div class="fm-sub" id="lastUpdate">Connecting...</div>
    </div>
    <div class="fm-header-right">
      <div class="conn-status"><div class="conn-dot" id="connDot"></div><span id="connLabel">Disconnected</span></div>
      <a class="fm-link" href="/scene-builder.html">Scene Builder</a>
      <a class="fm-link" href="/">Card View (v1)</a>
    </div>
  </header>

  <div class="fm-toolbar">
    <div class="fm-chip total"><b id="totalDevices">0</b> Total</div>
    <div class="fm-chip up"><b id="upCount">0</b> Up</div>
    <div class="fm-chip down"><b id="downCount">0</b> Down</div>
    <div class="fm-divider"></div>
    <span class="fm-chip" id="sceneInfo" style="color:var(--text-dim)">scene: —</span>
    <div class="fm-health">Health Score: <span class="score" id="healthScore">100%</span></div>
    <div class="fm-divider"></div>
    <div class="fm-zoom">
      <button class="reset" id="toggleLabels" title="Show/hide labels">Labels</button>
      <button class="reset" id="resetView" title="Reset camera">Reset View</button>
      <button class="reset" id="btnLoad" title="Muat scene.json manual">Muat scene.json</button>
    </div>
    <input type="file" id="fileScene" accept=".json,application/json" hidden>
  </div>

  <div class="fm-stage" id="stage">
    <canvas id="glcanvas"></canvas>

    <div class="fm-tooltip" id="tooltip"></div>

    <div class="fm-legend">
      <div class="lg-title">Status</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--up)"></span> Up / Online</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--down)"></span> Down / Offline</div>
      <div class="lg-row"><span class="lg-dot" style="background:#6b7280"></span> Belum terpetakan</div>
    </div>

    <div class="fm-hint">
      <div><b>Drag kiri</b> putar · <kbd>scroll</kbd> zoom · <b>drag kanan</b> geser</div>
      <div><b>Klik</b> penanda device untuk detail</div>
    </div>

    <div class="fm-splash" id="splash">
      <div class="spinner"></div>
      <div class="msg" id="splashMsg">Memuat scene…</div>
    </div>
  </div>

  <aside class="fm-detail" id="detailPanel"><div id="detailContent"></div></aside>

  <script type="module" src="/js/scene-view.js"></script>
</body>
</html>
