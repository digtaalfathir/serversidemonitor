<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Floor Map — Device Monitoring (v2)</title>
  <meta name="description" content="Rotatable 3D floor plan of monitored devices, extruded from the plan. Live status via WebSocket.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/floormap.css">
  <link rel="stylesheet" href="/css/floormap3d.css">

  <!-- Map bare module specifiers to the locally-vendored Three.js (no CDN, no build step) -->
  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three/three.module.min.js",
      "three/addons/": "/vendor/three/addons/"
    }
  }
  </script>
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="fm-header">
    <div>
      <h1>🏗️ Device Monitoring <span class="fm-tag">3D · v2</span></h1>
      <div class="fm-sub" id="lastUpdate">Connecting...</div>
    </div>
    <div class="fm-header-right">
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">Disconnected</span>
      </div>
      <a class="fm-link" href="/floormap.html">2D Map</a>
      <a class="fm-link" href="/">Card View (v1)</a>
    </div>
  </header>

  <!-- ============ TOOLBAR ============ -->
  <div class="fm-toolbar">
    <div class="fm-chip total"><b id="totalDevices">0</b> Total</div>
    <div class="fm-chip up"><b id="upCount">0</b> Up</div>
    <div class="fm-chip down"><b id="downCount">0</b> Down</div>
    <div class="fm-divider"></div>
    <select class="fm-select" id="floorSelect" title="Pilih denah lantai">
      <option value="F1">Denah Lantai 1 — Factory 4 (contoh)</option>
    </select>
    <div class="fm-health">Health Score: <span class="score" id="healthScore">100%</span></div>
    <div class="fm-divider"></div>
    <div class="fm-zoom">
      <button id="toggleLabels" class="reset" title="Show/hide device labels">Labels</button>
      <button class="reset" id="resetView" title="Reset camera">Reset View</button>
    </div>
  </div>

  <!-- ============ STAGE ============ -->
  <div class="fm-stage" id="stage">
    <canvas id="glcanvas"></canvas>
    <div id="labelLayer"></div>

    <!-- hover tooltip (reuses floormap.css .fm-tooltip) -->
    <div class="fm-tooltip" id="tooltip"></div>

    <!-- legend -->
    <div class="fm-legend">
      <div class="lg-title">Status</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--up)"></span> Up / Online</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--down)"></span> Down / Offline</div>
      <div class="lg-title" style="margin-top:10px">Severity (ring)</div>
      <div class="lg-row"><span class="lg-ring" style="border-color:var(--critical)"></span> Critical</div>
      <div class="lg-row"><span class="lg-ring" style="border-color:var(--high)"></span> High</div>
      <div class="lg-row"><span class="lg-ring" style="border-color:var(--medium)"></span> Medium</div>
      <div class="lg-row"><span class="lg-ring" style="border-color:var(--low)"></span> Low</div>
    </div>

    <!-- orbit hint -->
    <div class="fm-hint">
      <div><b>Drag kiri</b> putar · <kbd>scroll</kbd> zoom · <b>drag kanan</b> geser</div>
      <div><b>Klik</b> marker untuk detail</div>
    </div>

    <!-- loading / error splash -->
    <div class="fm-splash" id="splash">
      <div class="spinner"></div>
      <div class="msg" id="splashMsg">Memuat mesin 3D…</div>
    </div>
  </div>

  <!-- ============ DETAIL PANEL ============ -->
  <aside class="fm-detail" id="detailPanel">
    <div id="detailContent"></div>
  </aside>

  <script type="module" src="/js/floormap3d.js"></script>
</body>
</html>
