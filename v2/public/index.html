<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stechoq Pulse — Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/pulse.css">
  <!-- set tema sebelum paint (hindari flash) -->
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("pulse-theme") || "dark");</script>
  <script type="importmap">
  { "imports": { "three": "/vendor/three/three.module.min.js", "three/addons/": "/vendor/three/addons/" } }
  </script>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="brand"><span class="pulse"></span>Stechoq <b>Pulse</b></div>
    <div class="seg">
      <button id="t3d" class="active">3D</button>
      <button id="t2d" title="Tampilan denah 2D">2D</button>
    </div>
    <span class="tb-spacer"></span>
    <span class="tb-item" id="lastUpdate">Menyambung…</span>
    <span class="tb-item"><span class="conn-dot" id="connDot"></span><span id="connLabel">Offline</span></span>
    <button class="icon-btn" id="themeToggle" title="Tema gelap / terang">🌙</button>
  </div>

  <!-- ===== 3D STAGE ===== -->
  <div id="stage">
    <canvas id="glcanvas"></canvas>
    <div class="fm-tooltip" id="tooltip"></div>
  </div>

  <!-- ===== LEFT STAT PANEL (Cisco-style) ===== -->
  <div class="statpanel">
    <div class="sp-head">
      <span class="sp-dot" id="spDot"></span>
      <div class="sp-headtext">
        <div class="sp-name" id="sceneInfo">Monitoring</div>
        <div class="sp-sub" id="locSub">Menyambung…</div>
      </div>
    </div>
    <div class="sp-hero">
      <div class="sp-hero-val"><b id="upCount">0</b><span>/ <i id="totalDevices">0</i></span></div>
      <div class="sp-hero-lbl">device online</div>
    </div>
    <div class="sp-health">
      <div class="sp-health-top"><span>Health</span><b id="healthScore">100%</b></div>
      <div class="sp-bar"><i id="healthBar"></i></div>
    </div>
    <div class="sp-chips">
      <div class="sp-chip down"><b id="downCount">0</b><span>Down</span></div>
      <div class="sp-chip unknown"><b id="unknownCount">0</b><span>No data</span></div>
    </div>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div class="ctrls">
    <button class="icon-btn" id="toggleLabels" title="Label device on/off">🏷️</button>
    <button class="icon-btn" id="resetView" title="Reset kamera">⟳</button>
    <button class="icon-btn" id="btnLoad" title="Muat scene.json manual">📂</button>
    <input type="file" id="fileScene" accept=".json,application/json" hidden>
  </div>
  <div class="hint"><b>Drag</b> putar · <kbd>scroll</kbd> zoom · <b>klik</b> device untuk detail</div>

  <!-- ===== DETAIL PANEL ===== -->
  <aside class="fm-detail" id="detailPanel"><div id="detailContent"></div></aside>

  <!-- ===== SPLASH ===== -->
  <div class="fm-splash" id="splash"><div class="spinner"></div><div class="msg" id="splashMsg">Memuat scene…</div></div>

  <!-- theme toggle -->
  <script>
    (function () {
      const html = document.documentElement, btn = document.getElementById("themeToggle");
      function apply(t) {
        html.setAttribute("data-theme", t);
        localStorage.setItem("pulse-theme", t);
        btn.textContent = t === "light" ? "☀️" : "🌙";
        window.dispatchEvent(new CustomEvent("pulse-theme", { detail: t }));
      }
      btn.onclick = () => apply(html.getAttribute("data-theme") === "light" ? "dark" : "light");
      btn.textContent = html.getAttribute("data-theme") === "light" ? "☀️" : "🌙";
      // toggle 2D → pindah ke halaman denah 2D (tema & lokasi ikut)
      const l = new URLSearchParams(location.search).get("loc");
      const q = l ? "?loc=" + encodeURIComponent(l) : "";
      document.getElementById("t2d").onclick = () => (location.href = "/floormap.html" + q);
    })();
  </script>
  <script type="module" src="/js/scene-view.js"></script>
</body>
</html>
