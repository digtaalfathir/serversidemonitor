# =====================================================================
# Stechoq Pulse — nginx untuk domain iot-node.sugity.stechoq-j.com
# Proxy domain → 127.0.0.1:10102 (proses PM2 "stechoq-pulse").
# certbot nanti menambah blok 443 (HTTPS) + redirect otomatis.
# =====================================================================

# WebSocket upgrade. Kalau bentrok (sudah ada di /etc/nginx/nginx.conf),
# hapus baris ini dan pindahkan ke http{} nginx.conf.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name iot-node.sugity.stechoq-j.com;

    # halaman + aset statik (login, viewer, js, css, models, vendor)
    location / {
        proxy_pass http://127.0.0.1:10102;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # status live (/ws?loc=...) — WAJIB header upgrade
    location /ws {
        proxy_pass http://127.0.0.1:10102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }
}
